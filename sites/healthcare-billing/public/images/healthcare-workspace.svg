    <rect x="150" y="150" width="320" height="380" rx="4" />
    <rect x="550" y="250" width="280" height="320" rx="4" />
    <rect x="950" y="100" width="380" height="450" rx="4" />
    <rect x="1400" y="200" width="320" height="380" rx="4" />
    <rect x="250" y="650" width="450" height="280" rx="4" />
    <rect x="800" y="700" width="400" height="230" rx="4" />
    <rect x="1320" y="620" width="500" height="350" rx="4" />
