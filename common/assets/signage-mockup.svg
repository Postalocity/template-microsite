<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 120" fill="none" role="img" aria-labelledby="signage-title signage-desc">
  <title id="signage-title">Banking Notification Types</title>
  <desc id="signage-desc">Four notification types: Late Notice, Overdraft Alert, Insufficient Funds, and Credit Offer with icons and labels</desc>
  <!-- Late Notice - White Box with Yellow Icon + Shading -->
  <g transform="translate(20, 10)">
    <!-- Yellow shaded box -->
    <rect x="0" y="0" width="140" height="100" rx="8" fill="#FCB900" fill-opacity="0.15" stroke="#FCB900" stroke-width="2"/>
    <!-- Yellow icon - document with clock (DETAILED) -->
    <g transform="translate(70, 35)">
      <!-- White background for icon -->
      <rect x="-22" y="-24" width="44" height="48" rx="4" fill="#ffffff"/>
      <!-- Yellow shading -->
      <rect x="-22" y="-24" width="44" height="48" rx="4" fill="#FCB900" fill-opacity="0.15" stroke="#FCB900" stroke-width="2"/>
      <!-- Original detailed strokes -->
      <circle cx="0" cy="-8" r="6" fill="none" stroke="#FCB900" stroke-width="1.5"/>
      <line x1="0" y1="-8" x2="0" y2="-12" stroke="#FCB900" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="0" y1="-8" x2="4" y2="-8" stroke="#FCB900" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="-12" y1="5" x2="12" y2="5" stroke="#4a4a4a" stroke-width="1"/>
      <line x1="-12" y1="10" x2="8" y2="10" stroke="#4a4a4a" stroke-width="1"/>
    </g>
    <!-- Gray text -->
    <text x="70" y="75" text-anchor="middle" fill="#4a4a4a" font-family="system-ui" font-size="11" font-weight="normal">LATE NOTICE</text>
  </g>

  <!-- Overdraft Alert - White Box with Yellow Icon + Shading -->
  <g transform="translate(180, 10)">
    <!-- Yellow shaded box -->
    <rect x="0" y="0" width="140" height="100" rx="8" fill="#FCB900" fill-opacity="0.15" stroke="#FCB900" stroke-width="2"/>
    <!-- Yellow icon - warning/alert symbol (DETAILED) -->
    <g transform="translate(70, 35)">
      <!-- White background for icon -->
      <rect x="-22" y="-24" width="44" height="48" rx="4" fill="#ffffff"/>
      <!-- Yellow shading -->
      <rect x="-22" y="-24" width="44" height="48" rx="4" fill="#FCB900" fill-opacity="0.15" stroke="#FCB900" stroke-width="2"/>
      <!-- Original detailed strokes -->
      <path d="M0 -12 L-8 2 L8 2 Z" fill="none" stroke="#FCB900" stroke-width="1.5" stroke-linejoin="round"/>
      <line x1="0" y1="-6" x2="0" y2="-2" stroke="#FCB900" stroke-width="1.5" stroke-linecap="round"/>
      <circle cx="0" cy="6" r="1.5" fill="#FCB900"/>
      <line x1="-12" y1="16" x2="12" y2="16" stroke="#4a4a4a" stroke-width="1"/>
    </g>
    <!-- Gray text -->
    <text x="70" y="75" text-anchor="middle" fill="#4a4a4a" font-family="system-ui" font-size="11" font-weight="normal">OVERDRAFT ALERT</text>
  </g>

  <!-- Insufficient Funds - White Box with Yellow Icon + Shading -->
  <g transform="translate(340, 10)">
    <!-- Yellow shaded box -->
    <rect x="0" y="0" width="140" height="100" rx="8" fill="#FCB900" fill-opacity="0.15" stroke="#FCB900" stroke-width="2"/>
    <!-- Yellow icon - declined/insufficient symbol (DETAILED) -->
    <g transform="translate(70, 35)">
      <!-- White background for icon -->
      <rect x="-22" y="-24" width="44" height="48" rx="4" fill="#ffffff"/>
      <!-- Yellow shading -->
      <rect x="-22" y="-24" width="44" height="48" rx="4" fill="#FCB900" fill-opacity="0.15" stroke="#FCB900" stroke-width="2"/>
      <!-- X mark (yellow emblem) -->
      <line x1="-6" y1="-8" x2="6" y2="4" stroke="#FCB900" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="6" y1="-8" x2="-6" y2="4" stroke="#FCB900" stroke-width="1.5" stroke-linecap="round"/>
      <!-- Gray text line -->
      <line x1="-10" y1="14" x2="10" y2="14" stroke="#4a4a4a" stroke-width="1"/>
    </g>
    <!-- Gray text -->
    <text x="70" y="70" text-anchor="middle" fill="#4a4a4a" font-family="system-ui" font-size="10" font-weight="normal">INSUFFICIENT</text>
    <text x="70" y="82" text-anchor="middle" fill="#4a4a4a" font-family="system-ui" font-size="10" font-weight="normal">FUNDS</text>
  </g>

  <!-- Credit Offer - White Box with Yellow Icon + Shading -->
  <g transform="translate(500, 10)">
    <!-- Yellow shaded box -->
    <rect x="0" y="0" width="140" height="100" rx="8" fill="#FCB900" fill-opacity="0.15" stroke="#FCB900" stroke-width="2"/>
    <!-- Yellow icon - card/check document (DETAILED) -->
    <g transform="translate(70, 35)">
      <!-- White background for icon -->
      <rect x="-22" y="-24" width="44" height="48" rx="4" fill="#ffffff"/>
      <!-- Yellow shading -->
      <rect x="-22" y="-24" width="44" height="48" rx="4" fill="#FCB900" fill-opacity="0.15" stroke="#FCB900" stroke-width="2"/>
      <!-- Original detailed strokes -->
      <line x1="-14" y1="-16" x2="14" y2="-16" stroke="#4a4a4a" stroke-width="1"/>
      <line x1="-14" y1="-10" x2="14" y2="-10" stroke="#4a4a4a" stroke-width="1"/>
      <line x1="-14" y1="-4" x2="6" y2="-4" stroke="#4a4a4a" stroke-width="1"/>
      <rect x="-14" y="8" width="12" height="8" rx="1" fill="none" stroke="#FCB900" stroke-width="1"/>
      <rect x="2" y="8" width="12" height="8" rx="1" fill="none" stroke="#FCB900" stroke-width="1"/>
    </g>
    <!-- Gray text -->
    <text x="70" y="75" text-anchor="middle" fill="#4a4a4a" font-family="system-ui" font-size="11" font-weight="normal">CREDIT OFFER</text>
  </g>
</svg>
