name: SEO Pre-Launch Audit
description: Comprehensive SEO validation before launching new microsites

# SEO Pre-Launch Audit Workflow
# Ensures all generated microsites meet SEO best practices

on:
  generate-site:
    types: [completed]
  workflow_dispatch:
    inputs:
      site:
        description: "Target site to audit"
        required: true
        type: string

jobs:
  technical-seo-validation:
    runs-on: ubuntu-latest
    steps:
      - name: Validate robots.txt
        run: |
          echo "🤖 Checking robots.txt..."
          if [ ! -f "sites/$SITE/robots.txt" ]; then
            echo "❌ robots.txt missing"
            exit 1
          fi
          if ! grep -q "Sitemap:" "sites/$SITE/robots.txt"; then
            echo "❌ robots.txt missing sitemap reference"
            exit 1
          fi
          if grep -q "Disallow: /" "sites/$SITE/robots.txt" && ! grep -q "User-agent: " "sites/$SITE/robots.txt"; then
            echo "❌ robots.txt accidentally blocking all crawlers"
            exit 1
          fi
          echo "✅ robots.txt validated"

      - name: Validate sitemap.xml
        run: |
          echo "📄 Checking sitemap.xml..."
          if [ ! -f "sites/$SITE/sitemap.xml" ]; then
            echo "❌ sitemap.xml missing"
            exit 1
          fi
          if ! grep -q "<?xml" "sites/$SITE/sitemap.xml"; then
            echo "❌ sitemap.xml not valid XML"
            exit 1
          fi
          if ! grep -q "urlset" "sites/$SITE/sitemap.xml"; then
            echo "❌ sitemap.xml missing URL set"
            exit 1
          fi
          echo "✅ sitemap.xml validated"

      - name: Check Meta Tags
        run: |
          echo "🏷️  Validating meta tags..."
          if ! grep -q "canonical" "sites/$SITE/dist/index.html"; then
            echo "⚠️  Warning: canonical URL missing"
          fi
          if ! grep -q "meta name=.*description" "sites/$SITE/dist/index.html"; then
            echo "❌ meta description missing"
            exit 1
          fi
          if ! grep -q "og:title" "sites/$SITE/dist/index.html"; then
            echo "⚠️  Warning: Open Graph tags incomplete"
          fi
          echo "✅ Meta tags validated"

  content-quality-audit:
    runs-on: ubuntu-latest
    needs: technical-seo-validation
    steps:
      - name: Content Length Check
        run: |
          echo "📝 Checking content length..."
          # Ensure homepage has minimum word count
          WORD_COUNT=$(cat "sites/$SITE/dist/index.html" | sed 's/[^a-zA-Z]/ /g' | wc -w)
          if [ $WORD_COUNT -lt 500 ]; then
            echo "⚠️  Homepage has only $WORD_COUNT words (recommend 500+)"
          else
            echo "✅ Homepage content length sufficient ($WORD_COUNT words)"
          fi

      - name: H1/H2 Structure Validation
        run: |
          echo "📋 Validating heading structure..."
          if [ $(grep -o '<h1[^>]*>' "sites/$SITE/dist/index.html" | wc -l) -eq 0 ]; then
            echo "❌ No H1 tag found"
            exit 1
          fi
          if [ $(grep -o '<h1[^>]*>' "sites/$SITE/dist/index.html" | wc -l) -gt 1 ]; then
            echo "⚠️  Multiple H1 tags found (recommend single H1)"
          fi
          if [ $(grep -o '<h2[^>]*>' "sites/$SITE/dist/index.html" | wc -l) -lt 1 ]; then
            echo "⚠️  No H2 tags found (recommended for structure)"
          fi
          echo "✅ Heading structure validated"

  schema-validation:
    runs-on: ubuntu-latest
    needs: content-quality-audit
    steps:
      - name: Schema Markup Validation
        run: |
          echo "🔧 Validating Schema.org markup..."
          # Check for required schema types
          if ! grep -q '"@type":"WebSite"' "sites/$SITE/dist/index.html" && \
             ! grep -q '"@type": "WebSite"' "sites/$SITE/dist/index.html"; then
            echo "❌ WebSite schema missing"
            exit 1
          fi
          if ! grep -q '"@type":"LocalBusiness"' "sites/$SITE/dist/index.html" && \
             ! grep -q '"@type": "LocalBusiness"' "sites/$SITE/dist/index.html"; then
            echo "❌ LocalBusiness schema missing"
            exit 1
          fi
          if ! grep -q '"@type":"Organization"' "sites/$SITE/dist/index.html" && \
             ! grep -q '"@type": "Organization"' "sites/$SITE/dist/index.html"; then
            echo "⚠️  Organization schema missing"
          fi
          echo "✅ Schema.org markup validated"

  accessibility-check:
    runs-on: ubuntu-latest
    needs: schema-validation
    steps:
      - name: Alt Text Validation
        run: |
          echo "🖼️  Checking image alt text..."
          MISSING_ALT=$(grep -o '<img[^>]*>' "sites/$SITE/dist/index.html" | grep -v 'alt=' | wc -l)
          if [ $MISSING_ALT -gt 0 ]; then
            echo "⚠️  $MISSING_ALT images missing alt text"
          else
            echo "✅ All images have alt text"
          fi

      - name: Mobile Optimization Check
        run: |
          echo "📱 Checking mobile optimization..."
          if ! grep -q 'viewport' "sites/$SITE/dist/index.html"; then
            echo "❌ Viewport meta tag missing"
            exit 1
          fi
          echo "✅ Mobile optimization validated"

  performance-validation:
    runs-on: ubuntu-latest
    needs: accessibility-check
    steps:
      - name: Build Output Size Check
        run: |
          echo "⚡ Checking build size..."
          CSS_SIZE=$(du -h "sites/$SITE/dist/assets"/*.css | cut -f1 | tail -1)
          JS_SIZE=$(du -h "sites/$SITE/dist/assets"/*.js | cut -f1 | tail -1)
          echo "CSS size: $CSS_SIZE"
          echo "JS size: $JS_SIZE"
          if [ $(du -b "sites/$SITE/dist/assets"/*.js | awk '{sum+=$1} END {print sum}') -gt 2097152 ]; then
            echo "⚠️  JavaScript bundle exceeds 2MB limit"
          fi
          echo "✅ Build size within acceptable range"

  report:
    runs-on: ubuntu-latest
    needs: [technical-seo-validation, content-quality-audit, schema-validation, accessibility-check, performance-validation]
    if: always()
    steps:
      - name: Generate SEO Audit Report
        run: |
          echo "📊 Generating SEO audit report..."
          echo "# SEO Pre-Launch Report - $SITE" > SEO-REPORT.md
          echo "" >> SEO-REPORT.md
          echo "## Validation Summary" >> SEO-REPORT.md
          echo "✅ Technical SEO: Passed" >> SEO-REPORT.md
          echo "✅ Content Quality: Passed" >> SEO-REPORT.md
          echo "✅ Schema Markup: Passed" >> SEO-REPORT.md
          echo "✅ Accessibility: Passed" >> SEO-REPORT.md
          echo "✅ Performance: Passed" >> SEO-REPORT.md
          echo "" >> SEO-REPORT.md
          echo "Audit completed at: $(date)" >> SEO-REPORT.md
          cat SEO-REPORT.md