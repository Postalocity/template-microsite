name: backend-engineer
description: "Backend engineer agent for API development"
version: "1.0.0"
mode: subagent

# Logging Configuration
logging:
  level: warn
  format: json
  destinations:
    - console
    - file
  retention_days: 90

# Agent Capabilities
capabilities:
  - api-design
  - server-development
  - database-integration
  - authentication-implementation
  - performance-optimization

# Error Handling Configuration
error_handling:
  retry_attempts: 3
  circuit_breaker:
    enabled: true
    failure_threshold: 3
    recovery_timeout_ms: 30000
  fallback_strategy: strict

# Performance Configuration
performance:
  timeout_ms: 30000
  concurrency_limit: 5
  memory_limit_mb: 128

# Integration Hooks
integration:
  pre_commit: true
  post_commit: true
  deployment_validation: true
