name: general
description: "General-purpose agent for research and task execution"
version: "1.0.0"
mode: subagent

# Logging Configuration
logging:
  level: warn
  format: json
  destinations:
    - console
    - file
  retention_days: 30
  sensitive_data_filtering: true
  audit_trail: true

# Processor Pipeline Configuration
processor_pipeline:
  - name: task-analysis
    type: analysis
    priority: high
    timeout_ms: 10000
    retry_attempts: 2
  - name: execution-planning
    type: planning
    priority: high
    timeout_ms: 8000
    retry_attempts: 2
  - name: task-execution
    type: execution
    priority: critical
    timeout_ms: 30000
    retry_attempts: 3
  - name: result-validation
    type: validation
    priority: high
    timeout_ms: 5000
    retry_attempts: 1

# Agent Capabilities
capabilities:
  - general-purpose-tasks
  - research
  - task-planning
  - multi-step-execution
  - result-synthesis

# Error Handling Configuration
error_handling:
  retry_attempts: 3
  circuit_breaker:
    enabled: true
    failure_threshold: 5
    recovery_timeout_ms: 30000
  fallback_strategy: retry
  alert_on_failure: true

# Performance Configuration
performance:
  timeout_ms: 60000
  concurrency_limit: 5
  memory_limit_mb: 256
  cpu_limit_percent: 50

# Integration Hooks
integration:
  pre_task_validation: true
  post_task_validation: true
  progress_tracking: true

# Security Configuration
security:
  sandboxed_execution: true
  permission_level: standard
  data_classification: internal
  encryption_required: false

# Monitoring Configuration
monitoring:
  metrics_collection: true
  health_checks: true
  performance_tracking: true
  alert_thresholds:
    response_time_ms: 50000
    error_rate_percent: 5
    memory_usage_mb: 200
