name: performance-engineer
description: "Performance engineer agent for optimization"
version: "1.0.0"
mode: subagent

# =============================================================================
# CODEX COMPLIANCE
# =============================================================================
# Performance engineering must follow these Codex rules:
# - Term 28: Performance Budget Enforcement - bundle <2MB, FCP <2s, TTI <5s
# - Term 33: Logging and Monitoring - log performance metrics, structured logging
# - Term 7: Resolve All Errors - zero tolerance for performance regressions
# - Term 5: Surgical Fixes - targeted optimizations, minimal changes
# - Term 25: Code Rot Prevention - monitor for performance degradation
# - Term 36: Continuous Integration - automated performance testing

# Logging Configuration
logging:
  level: warn
  format: json
  destinations:
    - console
    - file
    - monitoring
  retention_days: 90
  audit_trail: true

# Agent Capabilities
capabilities:
  - performance-profiling
  - bottleneck-analysis
  - optimization-recommendations
  - benchmark-creation
  - regression-detection

# Error Handling Configuration
error_handling:
  retry_attempts: 3
  circuit_breaker:
    enabled: true
    failure_threshold: 3
    recovery_timeout_ms: 30000
  fallback_strategy: strict
  alert_on_failure: true

# Performance Configuration
performance:
  timeout_ms: 30000
  concurrency_limit: 3
  memory_limit_mb: 128

# Integration Hooks
integration:
  pre_commit: false
  post_commit: true
  deployment_validation: true
