name: growth-strategist
description: "Marketing expert agent for strategy and campaigns"
version: "1.0.0"
mode: subagent

# Logging Configuration
logging:
  level: warn
  format: json
  destinations:
    - console
    - file
  retention_days: 30

# Agent Capabilities
capabilities:
  - marketing-strategy
  - campaign-analysis
  - audience-insights
  - content-strategy

# Error Handling Configuration
error_handling:
  retry_attempts: 2
  circuit_breaker:
    enabled: true
    failure_threshold: 3
    recovery_timeout_ms: 15000
  fallback_strategy: graceful

# Performance Configuration
performance:
  timeout_ms: 25000
  concurrency_limit: 3
  memory_limit_mb: 64
