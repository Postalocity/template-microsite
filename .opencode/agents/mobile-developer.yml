name: mobile-developer
description: "Mobile developer agent for iOS/Android apps"
version: "1.0.0"
mode: subagent

# Logging Configuration
logging:
  level: warn
  format: json
  destinations:
    - console
    - file
  retention_days: 90

# Agent Capabilities
capabilities:
  - ios-development
  - android-development
  - cross-platform-development
  - mobile-ui-design
  - app-store-submission

# Error Handling Configuration
error_handling:
  retry_attempts: 3
  circuit_breaker:
    enabled: true
    failure_threshold: 3
    recovery_timeout_ms: 30000
  fallback_strategy: strict

# Performance Configuration
performance:
  timeout_ms: 30000
  concurrency_limit: 3
  memory_limit_mb: 128
